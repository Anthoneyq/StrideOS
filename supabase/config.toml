project_id = "stride-os"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://strideos.thecoachlab.app"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://127.0.0.1:8080",
  "http://localhost:3000",
  "http://localhost:8080",
  "https://stride-os-gray.vercel.app",
  "https://strideos.thecoachlab.app"
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

# Custom SMTP via Resend so transactional mail is sent from
# admin@thecoachlab.app (instead of Supabase's default sender).
# The password is the Resend API key, supplied via env var so it does not
# live in version control: set SUPABASE_SMTP_PASSWORD before `supabase db push`.
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(SUPABASE_SMTP_PASSWORD)"
admin_email = "admin@thecoachlab.app"
sender_name = "STRIDE OS"

# Branded transactional email templates. Each template references an HTML
# file under supabase/templates/. content_path is resolved from the repo
# root (where you run `supabase link`/`db push`), so it includes the
# supabase/ prefix. Subject lines are kept here so the template files stay
# pure markup.
[auth.email.template.confirmation]
subject = "Confirm your STRIDE OS account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.magic_link]
subject = "Your STRIDE OS sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.invite]
subject = "You've been invited to STRIDE OS"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Reset your STRIDE OS password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm your new STRIDE OS email"
content_path = "./supabase/templates/email_change.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# ── Edge function JWT policy (declarative, so deploys are correct regardless
# of CLI --no-verify-jwt flags). Two endpoints are called by third parties
# that cannot present a Supabase JWT and MUST run unauthenticated:
#   - stripe-webhook: authenticated by the Stripe signature, not a JWT.
#   - strava-oauth-callback: Strava's browser redirect carries only ?code&state
#     (the state is the athlete UUID); no Supabase JWT is present, so leaving
#     verify_jwt on would 401 every "Connect Strava" before the handler runs.
# The remaining functions are called by the signed-in app and keep JWT auth.
[functions.stripe-webhook]
verify_jwt = false

[functions.strava-oauth-callback]
verify_jwt = false

[functions.create-checkout-session]
verify_jwt = true

[functions.create-portal-session]
verify_jwt = true

[functions.strava-sync-activities]
verify_jwt = true
