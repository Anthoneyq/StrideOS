project_id = "stride-os"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://stride-os-gray.vercel.app"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://localhost:3000",
  "https://stride-os-gray.vercel.app"
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

# Custom SMTP via Resend so transactional mail is sent from
# admin@thecoachlab.app (instead of Supabase's default sender).
# The password is the Resend API key, supplied via env var so it does not
# live in version control: set SUPABASE_SMTP_PASSWORD before `supabase db push`.
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(SUPABASE_SMTP_PASSWORD)"
admin_email = "admin@thecoachlab.app"
sender_name = "STRIDE OS"

# Branded transactional email templates. Each template references an HTML
# file under supabase/templates/. Subject lines are kept here so the
# template files stay pure markup.
[auth.email.template.confirmation]
subject = "Confirm your STRIDE OS account"
content_path = "./templates/confirmation.html"

[auth.email.template.magic_link]
subject = "Your STRIDE OS sign-in link"
content_path = "./templates/magic_link.html"

[auth.email.template.invite]
subject = "You've been invited to STRIDE OS"
content_path = "./templates/invite.html"

[auth.email.template.recovery]
subject = "Reset your STRIDE OS password"
content_path = "./templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm your new STRIDE OS email"
content_path = "./templates/email_change.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
